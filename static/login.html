<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>toki-sync - Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f8fa;
    color: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .login-card {
    background: #fff;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .login-card h1 {
    font-size: 1.4rem;
    font-weight: 600;
    color: #2d4a7a;
    margin-bottom: 8px;
    text-align: center;
  }
  .login-card .subtitle {
    font-size: 0.85rem;
    color: #6b7280;
    text-align: center;
    margin-bottom: 28px;
  }
  label {
    display: block;
    font-size: 0.85rem;
    color: #6b7280;
    margin-bottom: 6px;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 8px;
    color: #1a1a2e;
    font-size: 0.95rem;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus {
    border-color: #2d4a7a;
  }
  button {
    width: 100%;
    padding: 10px;
    background: #2d4a7a;
    border: 1px solid #2d4a7a;
    border-radius: 8px;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #3a5d94; }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .oidc-btn {
    background: #4a7ab5;
    border-color: #4a7ab5;
    margin-top: 12px;
  }
  .oidc-btn:hover { background: #5a8ac5; }
  .divider {
    text-align: center;
    color: #6b7280;
    font-size: 0.8rem;
    margin: 16px 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: rgba(0,0,0,0.08);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }
  .error {
    background: rgba(220,53,69,0.1);
    border: 1px solid rgba(220,53,69,0.2);
    color: #dc3545;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 0.85rem;
    margin-bottom: 16px;
    display: none;
  }
</style>
</head>
<body>
<div class="login-card">
  <h1>toki-sync</h1>
  <p class="subtitle">Sign in to continue</p>
  <div id="error" class="error"></div>
  <form id="login-form">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" required autofocus>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>
    <button type="submit" id="submit-btn">Sign in</button>
  </form>
  <div id="oidc-section" style="display:none">
    <div class="divider">or</div>
    <button type="button" id="oidc-btn" class="oidc-btn">Sign in with OIDC</button>
  </div>
  <div id="register-link" style="display:none; text-align:center; margin-top:16px; font-size:0.85rem; color:#6b7280;">
    Don't have an account? <a href="#" id="show-register" style="color:#2d4a7a;">Create one</a>
  </div>
  <div id="register-section" style="display:none; margin-top:16px;">
    <div class="divider">create account</div>
    <form id="register-form">
      <label for="reg-username">Username</label>
      <input type="text" id="reg-username" name="username" autocomplete="username" required minlength="3" maxlength="32">
      <label for="reg-password">Password</label>
      <input type="password" id="reg-password" name="password" autocomplete="new-password" required minlength="8">
      <button type="submit" id="register-btn" style="background:#4a7ab5; border-color:#4a7ab5;">Create account</button>
    </form>
  </div>
</div>
<script>
(function() {
  // Check for tokens in URL fragment (OIDC callback)
  if (window.location.hash) {
    const params = new URLSearchParams(window.location.hash.substring(1));
    const at = params.get('access_token');
    const rt = params.get('refresh_token');
    const ei = params.get('expires_in');
    if (at && rt) {
      localStorage.setItem('access_token', at);
      localStorage.setItem('refresh_token', rt);
      if (ei) localStorage.setItem('expires_in', ei);
      window.location.href = '/admin';
      return;
    }
  }

  // If already logged in, redirect
  if (localStorage.getItem('access_token')) {
    window.location.href = '/admin';
    return;
  }

  // Check auth method and show OIDC button if available
  (async function() {
    try {
      const resp = await fetch('/auth-method', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: '' }),
      });
      if (resp.ok) {
        const data = await resp.json();
        if (data.method === 'oidc' && data.auth_url) {
          document.getElementById('oidc-section').style.display = 'block';
          document.getElementById('oidc-btn').addEventListener('click', function() {
            window.location.href = data.auth_url;
          });
        }
      }
    } catch (_) { /* ignore, password form remains available */ }
  })();

  // Check registration mode
  var registrationMode = 'closed';
  (async function() {
    try {
      const resp = await fetch('/auth/info');
      if (resp.ok) {
        const data = await resp.json();
        registrationMode = data.registration_mode || 'closed';
        if (registrationMode === 'open' || registrationMode === 'approval') {
          document.getElementById('register-link').style.display = 'block';
          if (registrationMode === 'approval') {
            // Add approval note above register form
            var note = document.createElement('div');
            note.style.cssText = 'background:rgba(45,74,122,0.08); border:1px solid rgba(45,74,122,0.2); color:#2d4a7a; padding:8px 12px; border-radius:8px; font-size:0.85rem; margin-bottom:12px;';
            note.textContent = 'Your request will need admin approval.';
            var regForm = document.getElementById('register-form');
            regForm.parentNode.insertBefore(note, regForm);
          }
          document.getElementById('show-register').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('register-link').style.display = 'none';
            document.getElementById('register-section').style.display = 'block';
          });
        }
      }
    } catch (_) {}
  })();

  // Register form
  var regForm = document.getElementById('register-form');
  regForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    errorEl.style.display = 'none';
    var regBtn = document.getElementById('register-btn');
    regBtn.disabled = true;
    regBtn.textContent = 'Creating account...';

    var username = document.getElementById('reg-username').value.trim();
    var password = document.getElementById('reg-password').value;

    try {
      var resp = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password }),
      });
      if (!resp.ok) {
        var data = await resp.json().catch(function() { return {}; });
        throw new Error(data.error || 'Registration failed (' + resp.status + ')');
      }
      // Approval mode: show pending message
      if (resp.status === 202) {
        errorEl.style.display = 'none';
        var msg = document.createElement('div');
        msg.style.cssText = 'background:rgba(25,135,84,0.1); border:1px solid rgba(25,135,84,0.2); color:#198754; padding:12px; border-radius:8px; font-size:0.95rem; text-align:center; margin-top:12px;';
        msg.textContent = 'Registration pending admin approval. Please wait for an admin to approve your account.';
        document.getElementById('register-section').appendChild(msg);
        regBtn.disabled = true;
        regBtn.textContent = 'Pending approval';
        return;
      }
      // Auto-login after registration (open mode)
      var loginResp = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password }),
      });
      if (!loginResp.ok) {
        throw new Error('Account created! Please sign in.');
      }
      var tokens = await loginResp.json();
      localStorage.setItem('access_token', tokens.access_token);
      localStorage.setItem('refresh_token', tokens.refresh_token);
      if (tokens.expires_in) localStorage.setItem('expires_in', String(tokens.expires_in));
      window.location.href = '/admin';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
      regBtn.disabled = false;
      regBtn.textContent = 'Create account';
    }
  });

  const form = document.getElementById('login-form');
  const errorEl = document.getElementById('error');
  const submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    errorEl.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in...';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const resp = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      if (!resp.ok) {
        const data = await resp.json().catch(() => ({}));
        throw new Error(data.error || 'Login failed (' + resp.status + ')');
      }

      const data = await resp.json();
      localStorage.setItem('access_token', data.access_token);
      localStorage.setItem('refresh_token', data.refresh_token);
      localStorage.setItem('expires_in', String(data.expires_in));
      window.location.href = '/admin';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign in';
    }
  });
})();
</script>
</body>
</html>
