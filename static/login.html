<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>toki-sync - Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: #0d1117;
    color: #c9d1d9;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .login-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
  }
  .login-card h1 {
    font-size: 1.4rem;
    font-weight: 600;
    color: #e6edf3;
    margin-bottom: 8px;
    text-align: center;
  }
  .login-card .subtitle {
    font-size: 0.85rem;
    color: #8b949e;
    text-align: center;
    margin-bottom: 28px;
  }
  label {
    display: block;
    font-size: 0.85rem;
    color: #8b949e;
    margin-bottom: 6px;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #c9d1d9;
    font-size: 0.95rem;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus {
    border-color: #58a6ff;
  }
  button {
    width: 100%;
    padding: 10px;
    background: #238636;
    border: 1px solid #2ea043;
    border-radius: 6px;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #2ea043; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .oidc-btn {
    background: #1f6feb;
    border-color: #388bfd;
    margin-top: 12px;
  }
  .oidc-btn:hover { background: #388bfd; }
  .divider {
    text-align: center;
    color: #8b949e;
    font-size: 0.8rem;
    margin: 16px 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: #30363d;
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }
  .error {
    background: #da363340;
    border: 1px solid #da3633;
    color: #f85149;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 0.85rem;
    margin-bottom: 16px;
    display: none;
  }
</style>
</head>
<body>
<div class="login-card">
  <h1>toki-sync</h1>
  <p class="subtitle">Sign in to your dashboard</p>
  <div id="error" class="error"></div>
  <form id="login-form">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" required autofocus>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>
    <button type="submit" id="submit-btn">Sign in</button>
  </form>
  <div id="oidc-section" style="display:none">
    <div class="divider">or</div>
    <button type="button" id="oidc-btn" class="oidc-btn">Sign in with OIDC</button>
  </div>
</div>
<script>
(function() {
  // Check for tokens in URL fragment (OIDC callback)
  if (window.location.hash) {
    const params = new URLSearchParams(window.location.hash.substring(1));
    const at = params.get('access_token');
    const rt = params.get('refresh_token');
    const ei = params.get('expires_in');
    if (at && rt) {
      localStorage.setItem('access_token', at);
      localStorage.setItem('refresh_token', rt);
      if (ei) localStorage.setItem('expires_in', ei);
      window.location.href = '/dashboard';
      return;
    }
  }

  // If already logged in, redirect
  if (localStorage.getItem('access_token')) {
    window.location.href = '/dashboard';
    return;
  }

  // Check auth method and show OIDC button if available
  (async function() {
    try {
      const resp = await fetch('/auth-method', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: '' }),
      });
      if (resp.ok) {
        const data = await resp.json();
        if (data.method === 'oidc' && data.auth_url) {
          document.getElementById('oidc-section').style.display = 'block';
          document.getElementById('oidc-btn').addEventListener('click', function() {
            window.location.href = data.auth_url;
          });
        }
      }
    } catch (_) { /* ignore, password form remains available */ }
  })();

  const form = document.getElementById('login-form');
  const errorEl = document.getElementById('error');
  const submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    errorEl.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in...';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const resp = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      if (!resp.ok) {
        const data = await resp.json().catch(() => ({}));
        throw new Error(data.error || 'Login failed (' + resp.status + ')');
      }

      const data = await resp.json();
      localStorage.setItem('access_token', data.access_token);
      localStorage.setItem('refresh_token', data.refresh_token);
      localStorage.setItem('expires_in', String(data.expires_in));
      window.location.href = '/dashboard';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign in';
    }
  });
})();
</script>
</body>
</html>
