services:
  toki-sync-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: toki-sync:${TOKI_VERSION:-latest}
    container_name: toki-sync-server
    restart: unless-stopped
    environment:
      TOKI_SYNC_CONFIG: /app/config/config.toml
      TOKI_ADMIN_PASSWORD: ${TOKI_ADMIN_PASSWORD}
      JWT_SECRET: ${TOKI_JWT_SECRET}
    ports:
      - "9091:9091"   # HTTP (direct access or behind Caddy)
      - "9090:9090"   # TCP sync (direct access or via Caddy L4)
    volumes:
      - ./config:/app/config:ro
      - toki-data:/app/data
    networks:
      - toki-internal
      - toki-external
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.101.0
    restart: unless-stopped
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=12"
      - "-dedup.minScrapeInterval=1ms"
      - "-httpListenAddr=:8428"
    volumes:
      - vm-data:/storage
    networks:
      - toki-internal
    # VM intentionally NOT exposed on host — accessed only via toki-sync proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8428/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    container_name: toki-caddy
    restart: unless-stopped
    profiles: ["caddy"]
    environment:
      TOKI_DOMAIN: ${TOKI_DOMAIN:-localhost}
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - toki-internal
      - toki-external
    depends_on:
      toki-sync-server:
        condition: service_healthy

volumes:
  toki-data:
  vm-data:
  caddy-data:
  caddy-config:

networks:
  toki-internal:
    driver: bridge
    internal: true    # VM is isolated: no direct host exposure
  toki-external:
    driver: bridge
    internal: false   # toki-sync and Caddy need outbound connectivity
