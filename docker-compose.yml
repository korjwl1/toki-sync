services:
  toki-sync:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TOKI_SYNC_CONFIG: /app/config/config.toml
      TOKI_ADMIN_PASSWORD: ${TOKI_ADMIN_PASSWORD}
    ports:
      - "9091:9091"   # HTTP
      - "9090:9090"   # TCP sync
    volumes:
      - ./config:/app/config:ro
      - toki-sync-data:/app/data
    networks:
      - toki-internal
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.101.0
    restart: unless-stopped
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=12"
      - "-dedup.minScrapeInterval=1ms"
      - "-httpListenAddr=:8428"
    volumes:
      - vm-data:/storage
    networks:
      - toki-internal
    # VM is intentionally NOT exposed on host — accessed only via toki-sync proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8428/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  toki-sync-data:
  vm-data:

networks:
  toki-internal:
    driver: bridge
    internal: false  # toki-sync needs outbound for updates; VM is isolated by no port mapping
