services:
  toki-sync-server:
    image: korjwl11/toki-sync:${TOKI_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toki-sync-server
    restart: unless-stopped
    environment:
      TOKI_ADMIN_PASSWORD: ${TOKI_ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      TOKI_SYNC_CONFIG: /etc/toki-sync/config.toml
    volumes:
      - ./config/toki-sync.toml:/etc/toki-sync/config.toml:ro
      - toki-data:/data
    networks:
      - internal
    # For Scenario B (no Caddy): add `ports: ["9090:9090", "9091:9091"]` and `networks: [internal, external]`
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  clickhouse:
    profiles: ["clickhouse"]
    image: clickhouse/clickhouse-server:latest
    container_name: toki-clickhouse
    restart: unless-stopped
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  caddy:
    # Self-signed mode (no domain): omit TOKI_EXTERNAL_URL and DUCKDNS_TOKEN
    # Client must use: toki sync enable --server <ip>:9090 --insecure --username admin
    profiles: ["caddy"]
    build:
      context: ./caddy
      dockerfile: Dockerfile
    container_name: toki-caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "9090:9090"
    environment:
      TOKI_DOMAIN: ${TOKI_EXTERNAL_URL}
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN:-}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    networks:
      - internal
      - external
    depends_on:
      toki-sync-server:
        condition: service_healthy

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  toki-data:        # SQLite + Fjall: user/device/cursor state + event store. Loss requires re-login + full re-sync
  clickhouse-data:  # ClickHouse event data (only used with --profile clickhouse). Loss is recoverable via client re-sync
  caddy-data:       # Let's Encrypt certificates. Loss triggers auto-reissue (rate limit: 5/week)
