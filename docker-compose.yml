services:
  toki-sync-server:
    image: ghcr.io/korjwl1/toki-sync-server:${TOKI_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toki-sync-server
    restart: unless-stopped
    environment:
      TOKI_ADMIN_PASSWORD: ${TOKI_ADMIN_PASSWORD}
      TOKI_JWT_SECRET: ${TOKI_JWT_SECRET}
      TOKI_SYNC_CONFIG: /etc/toki-sync/config.toml
    volumes:
      - ./config/toki-sync.toml:/etc/toki-sync/config.toml:ro
      - toki-data:/data
    networks:
      - internal
      - external
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.101.0
    restart: unless-stopped
    command:
      - -retentionPeriod=12
      - -storageDataPath=/vm-data
      - -dedup.minScrapeInterval=1ms
    volumes:
      - vm-data:/vm-data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8428/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  caddy:
    profiles: ["caddy"]
    build:
      context: ./caddy
      dockerfile: Dockerfile
    container_name: toki-caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "9090:9090"
    environment:
      TOKI_DOMAIN: ${TOKI_EXTERNAL_URL}
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN:-}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    networks:
      - internal
      - external
    depends_on:
      toki-sync-server:
        condition: service_healthy

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  toki-data:      # SQLite: user/device/cursor state. Loss requires re-login + full re-sync
  vm-data:        # VictoriaMetrics: all token usage history. Loss is unrecoverable
  caddy-data:     # Let's Encrypt certificates. Loss triggers auto-reissue (rate limit: 5/week)
